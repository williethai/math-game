<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Math Adventure - Addition Game</title>
<style>
  :root {
    --bg1: #6a11cb;
    --bg2: #2575fc;
    --card: #ffffff;
    --accent: #ff6b6b;
    --good: #2ecc71;
    --bad: #e74c3c;
    --text: #2d3436;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;               /* lock: no page scroll/resize jitter */
    overscroll-behavior: none;
  }

  body {
    font-family: "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    color: var(--text);
    /* Prevent accidental resizing: no text selection, no pinch/double-tap zoom */
    -webkit-user-select: none;
    -moz-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    touch-action: manipulation;
  }

  .card {
    position: relative;
    background: var(--card);
    width: 100%;
    max-width: 460px;
    height: min(92vh, 640px);       /* fixed frame: stays the same size across screens */
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    padding: 28px 24px 32px;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .card > section { width: 100%; }

  .mute-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    border: none;
    background: #f1f2f6;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    font-size: 1.1rem;
    cursor: pointer;
    line-height: 1;
  }
  .mute-btn:active { transform: scale(0.92); }

  h1 {
    font-size: 1.9rem;
    margin-bottom: 4px;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle { color: #888; margin-bottom: 20px; font-size: 0.95rem; }

  /* Level select */
  .levels { display: flex; flex-direction: column; gap: 14px; margin-top: 10px; }

  .level-btn {
    border: none;
    border-radius: 16px;
    padding: 18px;
    font-size: 1.1rem;
    font-weight: bold;
    color: #fff;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    box-shadow: 0 6px 0 rgba(0,0,0,0.15);
  }
  .level-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.15); }
  .lvl1 { background: #2ecc71; }
  .lvl2 { background: #f39c12; }
  .lvl3 { background: #e74c3c; }
  .lvl4 { background: #9b59b6; }
  .lvl5 { background: #2980b9; }
  .lvl6 { background: #16a085; }
  .level-btn small { display: block; font-weight: normal; opacity: 0.9; font-size: 0.8rem; margin-top: 4px; }

  /* Quiz */
  .topbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    align-items: center;
    margin-bottom: 18px;
    font-weight: bold;
    font-size: 0.9rem;
  }
  .pill { background: #f1f2f6; border-radius: 999px; padding: 6px 14px; }
  #timerLabel { background: #ffeaa7; color: #b8860b; }
  #timerLabel.warn { background: #ffd6d6; color: #c0392b; }

  .progress-track { height: 10px; background: #eee; border-radius: 999px; overflow: hidden; margin-bottom: 22px; }
  .progress-fill { height: 100%; width: 0; background: linear-gradient(90deg, var(--bg1), var(--bg2)); transition: width 0.3s ease; }

  .question { font-size: 2.6rem; font-weight: bold; margin: 10px 0 22px; letter-spacing: 2px; }

  .answer-input {
    width: 150px;
    font-size: 2rem;
    text-align: center;
    padding: 10px;
    border: 3px solid #dfe6e9;
    border-radius: 14px;
    outline: none;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
    -webkit-user-select: text;
    user-select: text;
  }
  .answer-input:focus { border-color: var(--bg2); }
  .answer-input::-webkit-outer-spin-button,
  .answer-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  .btn {
    display: inline-block;
    margin-top: 20px;
    border: none;
    border-radius: 14px;
    padding: 14px 28px;
    font-size: 1.05rem;
    font-weight: bold;
    color: #fff;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    cursor: pointer;
    box-shadow: 0 6px 0 rgba(0,0,0,0.15);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.15); }
  .btn.secondary { background: #b2bec3; }

  .feedback { min-height: 28px; margin-top: 16px; font-size: 1.2rem; font-weight: bold; }
  .feedback.good { color: var(--good); }
  .feedback.bad { color: var(--bad); }

  /* Results */
  .score-big { font-size: 3.4rem; font-weight: bold; margin: 8px 0; }
  .grade-badge {
    display: inline-block;
    font-size: 3rem;
    font-weight: bold;
    padding: 16px 34px;
    border-radius: 20px;
    color: #fff;
    margin: 12px 0 6px;
  }
  .grade-msg { font-size: 1.15rem; margin-bottom: 8px; }
  .stars { font-size: 2rem; letter-spacing: 6px; margin-bottom: 10px; }

  /* Setup screen */
  .setup-heading { font-weight: bold; margin: 20px 0 10px; font-size: 1.05rem; }
  .choice-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
  .opt-btn {
    border: 3px solid #dfe6e9;
    background: #fff;
    border-radius: 14px;
    padding: 12px 18px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    color: var(--text);
    transition: transform 0.1s ease, border-color 0.12s, background 0.12s, color 0.12s;
  }
  .opt-btn:active { transform: translateY(2px); }
  .opt-btn.selected {
    border-color: var(--bg2);
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    color: #fff;
  }
  .num-btn { min-width: 62px; }

  /* Multiple-choice answers in quiz */
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 4px 0; }
  .choice-answer {
    border: 3px solid #dfe6e9;
    background: #fff;
    border-radius: 16px;
    padding: 18px 10px;
    font-size: 1.7rem;
    font-weight: bold;
    cursor: pointer;
    color: var(--text);
    transition: transform 0.1s ease, border-color 0.12s, background 0.12s, color 0.12s;
  }
  .choice-answer:active { transform: translateY(2px); }
  .choice-answer.selected {
    border-color: var(--bg2);
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    color: #fff;
  }
  .choice-answer.correct { border-color: var(--good); background: var(--good); color: #fff; }
  .choice-answer.wrong { border-color: var(--bad); background: var(--bad); color: #fff; }

  .hidden { display: none; }
</style>
</head>
<body>
  <div class="card">
    <button class="mute-btn" id="muteBtn" onclick="toggleMute()" title="Sound on/off">🔊</button>
    <!-- START SCREEN -->
    <section id="start">
      <h1>Math Adventure</h1>
      <p class="subtitle">Pick a level and solve the additions!</p>
      <div class="levels">
        <button class="level-btn lvl1" onclick="chooseLevel(1)">
          Level 1 <small>Sums up to 10</small>
        </button>
        <button class="level-btn lvl2" onclick="chooseLevel(2)">
          Level 2 <small>Sums up to 20</small>
        </button>
        <button class="level-btn lvl3" onclick="chooseLevel(3)">
          Level 3 <small>Sums up to 30</small>
        </button>
        <button class="level-btn lvl4" onclick="chooseLevel(4)">
          Level 4 <small>Add &amp; subtract, numbers under 20</small>
        </button>
        <button class="level-btn lvl5" onclick="chooseLevel(5)">
          Level 5 <small>Add &amp; subtract, numbers under 30</small>
        </button>
        <button class="level-btn lvl6" onclick="chooseLevel(6)">
          Level 6 <small>Add &amp; subtract, numbers under 40</small>
        </button>
      </div>
    </section>

    <!-- SETUP SCREEN -->
    <section id="setup" class="hidden">
      <h1>Game Setup</h1>
      <p class="subtitle" id="setupLevelLabel">Level 1</p>

      <p class="setup-heading">How many questions?</p>
      <div class="choice-row" id="numRow">
        <button class="opt-btn num-btn" data-num="10" onclick="setNumQuestions(10)">10</button>
        <button class="opt-btn num-btn" data-num="20" onclick="setNumQuestions(20)">20</button>
        <button class="opt-btn num-btn" data-num="30" onclick="setNumQuestions(30)">30</button>
        <button class="opt-btn num-btn" data-num="40" onclick="setNumQuestions(40)">40</button>
        <button class="opt-btn num-btn" data-num="50" onclick="setNumQuestions(50)">50</button>
        <button class="opt-btn num-btn" data-num="60" onclick="setNumQuestions(60)">60</button>
        <button class="opt-btn num-btn" data-num="70" onclick="setNumQuestions(70)">70</button>
        <button class="opt-btn num-btn" data-num="80" onclick="setNumQuestions(80)">80</button>
        <button class="opt-btn num-btn" data-num="90" onclick="setNumQuestions(90)">90</button>
        <button class="opt-btn num-btn" data-num="100" onclick="setNumQuestions(100)">100</button>
        <button class="opt-btn num-btn" data-num="110" onclick="setNumQuestions(110)">110</button>
        <button class="opt-btn num-btn" data-num="120" onclick="setNumQuestions(120)">120</button>
        <button class="opt-btn num-btn" data-num="130" onclick="setNumQuestions(130)">130</button>
        <button class="opt-btn num-btn" data-num="140" onclick="setNumQuestions(140)">140</button>
        <button class="opt-btn num-btn" data-num="150" onclick="setNumQuestions(150)">150</button>
        <button class="opt-btn num-btn" data-num="160" onclick="setNumQuestions(160)">160</button>
      </div>

      <div>
        <button class="btn" onclick="beginGame()">Start</button>
        <button class="btn secondary" onclick="goHome()">Back</button>
      </div>
    </section>

    <!-- QUIZ SCREEN -->
    <section id="quiz" class="hidden">
      <div class="topbar">
        <span class="pill" id="levelLabel">Level 1</span>
        <span class="pill" id="progressLabel">1 / 10</span>
        <span class="pill" id="timerLabel">0:00</span>
        <span class="pill" id="scoreLabel">Score: 0</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

      <div class="question" id="question">2 + 3</div>
      <div class="choices" id="choices"></div>
    </section>

    <!-- RESULTS SCREEN -->
    <section id="results" class="hidden">
      <h1>All done!</h1>
      <p class="subtitle" id="finalLevel">Level 1</p>
      <div class="stars" id="stars"></div>
      <div class="grade-badge" id="gradeBadge">A</div>
      <p class="grade-msg" id="gradeMsg"></p>
      <p class="score-big" id="finalScore">10 / 10</p>
      <p class="subtitle" id="finalPct">100% correct</p>
      <p class="subtitle" id="finalTime">Time: 0:00</p>
      <p class="subtitle" id="finalCompleted">Completed: 21/07/2026 21:59:00</p>
      <div>
        <button class="btn" onclick="beginGame()">Play Again</button>
        <button class="btn secondary" onclick="openSetup()">Change Setup</button>
        <button class="btn secondary" onclick="goHome()">Menu</button>
      </div>
    </section>
  </div>

<script>
  const LEVEL_MAX = { 1: 10, 2: 20, 3: 30 };   // addition-only levels (sum cap)
  const ADDSUB_MAX = { 4: 20, 5: 30, 6: 40 };  // add/subtract levels (numbers under this)
  const MS_PER_QUESTION = 2000;                // 2s per question -> whole-test time limit

  let currentLevel = 1;
  let numQuestions = 10;
  let questions = [];
  let index = 0;
  let score = 0;
  let choiceLocked = false;   // prevents double-tapping options
  let gameOver = false;       // guards against double-finishing

  let startTime = 0;
  let elapsedMs = 0;
  let totalLimitMs = 0;       // whole-test time budget
  let timerId = null;

  // --- Sound (self-contained via Web Audio, no files) ---
  let soundOn = true;
  let audioCtx = null;

  function ac() {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
    }
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }

  function tone(freq, startOffset, dur, type, gain) {
    const ctx = ac();
    if (!ctx) return;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type || "sine";
    osc.frequency.value = freq;
    osc.connect(g);
    g.connect(ctx.destination);
    const t = ctx.currentTime + (startOffset || 0);
    const peak = gain || 0.2;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(peak, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.start(t);
    osc.stop(t + dur + 0.02);
  }

  function playCorrect() {
    if (!soundOn) return;
    tone(660, 0, 0.12, "sine", 0.25);
    tone(880, 0.10, 0.16, "sine", 0.25);
  }
  function playWrong() {
    if (!soundOn) return;
    tone(200, 0, 0.28, "sawtooth", 0.18);
  }
  function playFinish() {
    if (!soundOn) return;
    [523, 659, 784, 1047].forEach((f, i) => tone(f, i * 0.14, 0.22, "triangle", 0.25));
  }

  function toggleMute() {
    soundOn = !soundOn;
    document.getElementById("muteBtn").textContent = soundOn ? "🔊" : "🔇";
    if (soundOn) ac();
  }

  function randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // Build 4 options: the correct answer, one adjacent-tens trap, and 2 close distractors.
  function makeOptions(answer) {
    const opts = new Set([answer]);
    const tensTraps = [answer - 10, answer + 10].filter(c => c >= 0);
    opts.add(tensTraps[randInt(0, tensTraps.length - 1)]);

    let spread = 1;
    while (opts.size < 4) {
      [answer - spread, answer + spread].forEach(c => {
        if (c >= 0 && opts.size < 4) opts.add(c);
      });
      spread++;
      if (spread > 50) break; // safety
    }
    return shuffle([...opts]);
  }

  // Build a question for the given level.
  // Levels 1-3: addition with sum <= level cap, all addends >= 1 (no "0").
  // Levels 4-6: addition or subtraction with all numbers under the cap (20/30/40),
  //             every left-to-right partial result stays positive (no negatives).
  function makeQuestion(level, useThreeNumbers = false) {
    if (ADDSUB_MAX[level]) {
      const hi = ADDSUB_MAX[level] - 1;    // numbers "under" the cap
      if (useThreeNumbers) {
        // Build left-to-right so every partial result stays positive
        // (elementary students have not learned negative numbers yet).
        const op = Math.random() < 0.5 ? "+" : "-";
        const op2 = Math.random() < 0.5 ? "+" : "-";
        let a, b, mid;
        if (op === "+") {
          a = randInt(1, hi);
          b = randInt(1, hi);
          mid = a + b;
        } else {
          a = randInt(2, hi);
          b = randInt(1, a - 1);
          mid = a - b;
        }
        let c, ans;
        if (op2 === "+") {
          c = randInt(1, hi);
          ans = mid + c;
        } else {
          // If mid is 1, subtraction would force a non-positive result — use + instead.
          if (mid <= 1) {
            c = randInt(1, hi);
            return { a, b, c, op, op2: "+", answer: mid + c, options: makeOptions(mid + c) };
          }
          c = randInt(1, mid - 1);
          ans = mid - c;
        }
        return { a, b, c, op, op2, answer: ans, options: makeOptions(ans) };
      }

      if (Math.random() < 0.5) {
        const a = randInt(1, hi);
        const b = randInt(1, hi);
        const ans = a + b;
        return { a, b, op: "+", answer: ans, options: makeOptions(ans) };
      } else {
        const a = randInt(2, hi);
        const b = randInt(1, a - 1);       // b < a so a - b is always positive
        const ans = a - b;
        return { a, b, op: "-", answer: ans, options: makeOptions(ans) };
      }
    }

    const max = LEVEL_MAX[level];
    if (useThreeNumbers) {
      const sum = randInt(3, max);
      const a = randInt(1, sum - 2);
      const b = randInt(1, sum - a - 1);
      const c = sum - a - b;
      return { a, b, c, op: "+", op2: "+", answer: sum, options: makeOptions(sum) };
    }

    const sum = randInt(2, max);           // target result (at least 2)
    const a = randInt(1, sum - 1);         // first addend (1..sum-1)
    const b = sum - a;                     // second addend so a + b = sum
    return { a, b, op: "+", answer: sum, options: makeOptions(sum) };
  }

  function chooseLevel(level) {
    currentLevel = level;
    openSetup();
  }

  function openSetup() {
    document.getElementById("setupLevelLabel").textContent = "Level " + currentLevel;
    setNumQuestions(numQuestions);
    show("setup");
  }

  function setNumQuestions(n) {
    numQuestions = n;
    document.querySelectorAll("#numRow .num-btn").forEach(btn => {
      btn.classList.toggle("selected", Number(btn.dataset.num) === n);
    });
  }

  // Key that treats "2 + 3" and "3 + 2" as the same question.
  function qKey(q) {
    if (q.c !== undefined) {
      if (q.op === "+" && q.op2 === "+") {
        return [q.a, q.b, q.c].sort((a, b) => a - b).join("+");
      }
      return q.a + q.op + q.b + q.op2 + q.c;
    }
    if (q.op === "+") {
      return Math.min(q.a, q.b) + "+" + Math.max(q.a, q.b);
    }
    return q.a + "-" + q.b;
  }

  function beginGame() {
    questions = [];
    const threeNumberCount = Math.round(numQuestions * 0.1);
    const questionTypes = shuffle([
      ...Array(threeNumberCount).fill(true),
      ...Array(numQuestions - threeNumberCount).fill(false)
    ]);
    let prevKey = null;
    for (let i = 0; i < numQuestions; i++) {
      let q, key, guard = 0;
      do {                                   // make each question different from the previous one
        q = makeQuestion(currentLevel, questionTypes[i]);
        key = qKey(q);
        guard++;
      } while (key === prevKey && guard < 40);
      prevKey = key;
      questions.push(q);
    }
    index = 0;
    score = 0;
    gameOver = false;
    totalLimitMs = numQuestions * MS_PER_QUESTION;

    show("quiz");
    document.getElementById("levelLabel").textContent = "Level " + currentLevel;
    startTimer();
    renderQuestion();
  }

  function renderQuestion() {
    const q = questions[index];
    document.getElementById("question").textContent =
      q.a + " " + q.op + " " + q.b +
      (q.c !== undefined ? " " + q.op2 + " " + q.c : "");
    document.getElementById("progressLabel").textContent = (index + 1) + " / " + numQuestions;
    document.getElementById("scoreLabel").textContent = "Score: " + score;
    document.getElementById("progressFill").style.width = (index / numQuestions * 100) + "%";

    const choices = document.getElementById("choices");
    choiceLocked = false;
    choices.innerHTML = "";
    q.options.forEach(val => {
      const btn = document.createElement("button");
      btn.className = "choice-answer";
      btn.textContent = val;
      btn.dataset.val = val;
      btn.onclick = () => selectOption(val, btn);
      choices.appendChild(btn);
    });
  }

  // Choice-only: correct answer advances, a wrong answer ends the test.
  function selectOption(val, btn) {
    if (choiceLocked || gameOver) return;
    choiceLocked = true;

    const q = questions[index];
    const correct = val === q.answer;

    if (correct) {
      btn.classList.add("correct");
      playCorrect();
      score++;
      document.getElementById("scoreLabel").textContent = "Score: " + score;
      setTimeout(() => {
        if (gameOver) return;
        if (index === numQuestions - 1) {
          finishGame("won");
        } else {
          index++;
          renderQuestion();
        }
      }, 20);
    } else {
      // Show the mistake and the right answer, then end the test.
      btn.classList.add("wrong");
      document.querySelectorAll("#choices .choice-answer").forEach(b => {
        if (Number(b.dataset.val) === q.answer) b.classList.add("correct");
      });
      playWrong();
      setTimeout(() => finishGame("wrong"), 1100);
    }
  }

  function startTimer() {
    stopTimer();
    startTime = Date.now();
    elapsedMs = 0;
    updateTimer();
    timerId = setInterval(updateTimer, 250);
  }

  function stopTimer() {
    if (timerId !== null) { clearInterval(timerId); timerId = null; }
  }

  function updateTimer() {
    elapsedMs = Date.now() - startTime;
    const remaining = Math.max(0, totalLimitMs - elapsedMs);
    const label = document.getElementById("timerLabel");
    label.textContent = formatTime(remaining);
    label.classList.toggle("warn", remaining <= 5000);
    if (remaining <= 0 && !gameOver) {
      finishGame("timeout");
    }
  }

  function formatTime(ms) {
    const total = Math.floor(ms / 1000);
    const m = Math.floor(total / 60);
    const s = total % 60;
    return m + ":" + String(s).padStart(2, "0");
  }

  function formatDateTime(date) {
    const pad = value => String(value).padStart(2, "0");
    return pad(date.getDate()) + "/" +
      pad(date.getMonth() + 1) + "/" +
      date.getFullYear() + " " +
      pad(date.getHours()) + ":" +
      pad(date.getMinutes()) + ":" +
      pad(date.getSeconds());
  }

  function finishGame(outcome) {
    if (gameOver) return;
    gameOver = true;
    stopTimer();
    if (outcome === "won") playFinish();
    showResults(outcome);
  }

  function gradeFor(pct) {
    if (pct >= 90) return { grade: "A", color: "#2ecc71", stars: 5, msg: "Outstanding! You're a math star!" };
    if (pct >= 80) return { grade: "B", color: "#27ae60", stars: 4, msg: "Great job! Keep it up!" };
    if (pct >= 70) return { grade: "C", color: "#f39c12", stars: 3, msg: "Good work! A little more practice." };
    if (pct >= 60) return { grade: "D", color: "#e67e22", stars: 2, msg: "Nice try! Let's practice more." };
    return { grade: "F", color: "#e74c3c", stars: 1, msg: "Keep practicing, you can do it!" };
  }

  function showResults(outcome) {
    const won = outcome === "won";
    const pct = Math.round(score / numQuestions * 100);
    const g = won
      ? { grade: "A", color: "#2ecc71", stars: 5, msg: "Perfect! You answered them all correctly!" }
      : gradeFor(pct);

    let prefix = "";
    if (outcome === "wrong") prefix = "Wrong answer \u2014 test ended. ";
    else if (outcome === "timeout") prefix = "Time's up! ";

    document.getElementById("gradeBadge").textContent = g.grade;
    document.getElementById("gradeBadge").style.background = g.color;
    document.getElementById("gradeMsg").textContent = prefix + g.msg;
    document.getElementById("finalLevel").textContent = "Level " + currentLevel;
    document.getElementById("finalScore").textContent = score + " / " + numQuestions;
    document.getElementById("finalPct").textContent = pct + "% correct";
    document.getElementById("finalTime").textContent =
      "Time: " + formatTime(Math.min(elapsedMs, totalLimitMs)) + " / " + formatTime(totalLimitMs);
    document.getElementById("finalCompleted").textContent =
      "Completed: " + formatDateTime(new Date());
    document.getElementById("stars").textContent =
      "★".repeat(g.stars) + "☆".repeat(5 - g.stars);

    show("results");
  }

  function goHome() { stopTimer(); show("start"); }

  function show(screen) {
    ["start", "setup", "quiz", "results"].forEach(id => {
      document.getElementById(id).classList.toggle("hidden", id !== screen);
    });
  }
</script>
</body>
</html>
